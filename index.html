<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Lova Admin Command Center</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #fafafa; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; padding: 20px; }
    
    /* Minimalist Navbar */
    .navbar { background: #111111; color: white; padding: 16px 24px; border-radius: 10px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; }
    .navbar-brand { font-weight: 700; font-size: 18px; letter-spacing: 0.5px; }
    
    /* Clean Card & Table */
    .card { border: 1px solid #eaeaea; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
    .table th { background: #ffffff; color: #888888; font-size: 11px; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; border-bottom: 1px solid #eeeeee; padding: 16px; }
    .table td { vertical-align: middle; font-size: 13px; color: #333333; border-bottom: 1px solid #f5f5f5; padding: 16px; }
    
    /* Monochrome Status Badges */
    .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .status-received { background: #f0f0f0; color: #555555; }
    .status-processing { background: #111111; color: #ffffff; }
    .status-shipped { background: #ffffff; color: #111111; border: 1px solid #111111; }
    
    /* Sleek Outline Buttons */
    .action-btn { font-size: 11px; font-weight: 600; padding: 6px 12px; border-radius: 6px; margin-right: 4px; margin-bottom: 4px; transition: all 0.2s ease; border: 1px solid #dddddd; background: #ffffff; color: #333333; cursor: pointer; text-decoration: none; display: inline-block; }
    .action-btn:hover { background: #f5f5f5; border-color: #bbbbbb; color: #111111; }
    .btn-cancel { color: #d32e30; border-color: #fca5a5; } 
    .btn-cancel:hover { background: #fef2f2; border-color: #ef4444; color: #d32e30; }
    
    /* Login Screen */
    .login-container { max-width: 400px; margin: 100px auto; }
    .pin-input { font-size: 20px; letter-spacing: 8px; height: 55px; border-radius: 10px; border: 1px solid #ddd; transition: 0.2s; }
    .pin-input:focus { border-color: #111; box-shadow: none; outline: none; }
    .btn-black { background: #111; color: #fff; font-weight: 700; height: 50px; border-radius: 10px; border: none; transition: 0.2s; }
    .btn-black:hover { background: #333; color: #fff; }

    #adminDashboard { display: none; }
  </style>
</head>
<body>

  <div id="loginScreen" class="container login-container">
    <div class="card p-4 text-center">
      <h3 style="color:#111; font-weight:800; margin-bottom: 4px; letter-spacing: -0.5px;">Lova Admin</h3>
      <p style="color:#888; font-size:13px; margin-bottom:24px;">Marketing Command Center</p>
      <input type="password" id="adminPin" class="form-control text-center mb-3 pin-input" placeholder="••••••" onkeydown="if(event.key==='Enter') adminLogin()">
      <button class="w-100 btn-black" onclick="adminLogin()">Access Terminal</button>
      <div id="loginStatus" class="mt-3 fw-bold" style="font-size:13px; color:#d32e30;"></div>
    </div>
  </div>

  <div id="adminDashboard" class="container-fluid" style="max-width: 1200px;">
    <div class="navbar">
      <div class="navbar-brand">Active Orders</div>
      <div>
        <span id="adminName" style="margin-right: 16px; font-size: 13px; color: #aaaaaa; font-weight: 500;"></span>
        <button class="btn btn-sm btn-light fw-bold" style="border-radius: 6px; font-size: 12px; padding: 6px 12px;" onclick="refreshData()">🔄 Refresh</button>
      </div>
    </div>

    <div class="card p-0 overflow-hidden">
      <div class="table-responsive">
        <table class="table mb-0 table-hover align-middle">
          <thead>
            <tr>
              <th>Order ID</th>
              <th>Date</th>
              <th>Location</th>
              <th>Requested By</th>
              <th>Item & Details</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="orderTableBody">
            <tr><td colspan="7" class="text-center py-5 text-muted">Loading live orders...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzKbbSF3uVnDqjBNolLRxKVmTYX4mkyAIqwMhJplYJS4KrGq0Z52Y3TqY-ZJ0eE5iZX/exec";

    async function callGAS(action, params) {
      const url = GAS_URL + '?action=' + encodeURIComponent(action) + '&payload=' + encodeURIComponent(JSON.stringify(params)) + '&t=' + Date.now();
      const res = await fetch(url, { method: 'GET', redirect: 'follow' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return JSON.parse(await res.text());
    }

    async function adminLogin() {
      const pin = document.getElementById('adminPin').value;
      const statusEl = document.getElementById('loginStatus');
      statusEl.innerText = "Authenticating...";
      try {
        const res = await callGAS('verifyStaffLogin', { passcode: pin });
        if (res.success) {
          document.getElementById('loginScreen').style.display = 'none';
          document.getElementById('adminDashboard').style.display = 'block';
          document.getElementById('adminName').innerText = "Logged in as: " + res.name;
          refreshData();
        } else {
          statusEl.innerText = "Invalid PIN.";
        }
      } catch(e) {
        statusEl.innerText = "Connection failed.";
      }
    }

    async function refreshData() {
      const tbody = document.getElementById('orderTableBody');
      tbody.innerHTML = '<tr><td colspan="7" class="text-center py-5 text-muted fw-bold">🔄 Syncing with database...</td></tr>';
      try {
        const res = await callGAS('getAllActiveOrders', {});
        
        // Ensure successful connection and verify data is present
        if (res.success && res.data && res.data.length > 0) {
          tbody.innerHTML = res.data.map(o => {
            
            let badgeClass = 'status-received';
            if (o.status === 'Processing' || o.status === 'In Progress' || o.status === 'Scheduled') badgeClass = 'status-processing';
            if (o.status === 'Shipped' || o.status === 'Dispatched') badgeClass = 'status-shipped';

            // CRITICAL FIX: Convert everything to a String before manipulating to prevent crash loops
            let safeDetails = String(o.details || "");
            let cleanDetails = safeDetails.replace("🚨 [URGENT] ", "<span style='color:#d32e30;font-weight:700;'>[URGENT]</span> ");
            let safeBranch = String(o.branch || "").replace(/\|/g, " - ");
            let safeItem = String(o.item || "");
            let safeId = String(o.id || "");
            let safeDate = String(o.date || "");
            let safeStaff = String(o.staff || "");
            let safeStatus = String(o.status || "");

            return `
              <tr>
                <td style="font-family:monospace; font-size:12px; color:#888;">${safeId}</td>
                <td style="font-size:12px; color:#666;">${safeDate}</td>
                <td style="font-weight:700; color:#111;">${safeBranch}</td>
                <td style="font-size:13px; color:#444;">${safeStaff}</td>
                <td style="max-width: 320px;">
                  <div style="font-weight:700; color:#111; font-size:14px; margin-bottom: 2px;">${safeItem}</div>
                  <div style="font-size:12px; color:#666; white-space:pre-wrap; line-height: 1.4;">${cleanDetails}</div>
                </td>
                <td><span class="status-badge ${badgeClass}">${safeStatus}</span></td>
                <td style="min-width: 200px;">
                  <button class="action-btn" onclick="updateStatus('${safeId}', 'Processing')">Process</button>
                  <button class="action-btn" onclick="updateStatus('${safeId}', 'Shipped')">Ship</button>
                  <a href="${o.link}" target="_blank" class="action-btn">Timeline</a>
                  <button class="action-btn btn-cancel" onclick="updateStatus('${safeId}', 'Canceled')">Cancel</button>
                </td>
              </tr>
            `;
          }).join('');
        } else if (res.success) {
          tbody.innerHTML = '<tr><td colspan="7" class="text-center py-5 text-muted fw-bold">No active orders right now. You are all caught up!</td></tr>';
        } else {
          // If the backend actively rejected the request
          tbody.innerHTML = `<tr><td colspan="7" class="text-center py-5 text-danger fw-bold">Backend Error: ${res.message || "Action not found."}</td></tr>`;
        }
      } catch(e) {
        // If the Javascript fails, print the exact crash log to the screen
        tbody.innerHTML = `<tr><td colspan="7" class="text-center py-5 text-danger fw-bold">Display Error: ${e.message}</td></tr>`;
      }
    }

    async function updateStatus(orderId, newStatus) {
      if (!confirm(`Are you sure you want to mark order ${orderId} as ${newStatus}?`)) return;
      
      try {
        const res = await callGAS('adminUpdateOrder', { orderId: orderId, newStatus: newStatus });
        if (res.success) {
          refreshData(); 
        } else {
          alert("Failed to update status: " + res.message);
        }
      } catch(e) {
        alert("Network error while updating.");
      }
    }
  </script>
</body>
</html>
